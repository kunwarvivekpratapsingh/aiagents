name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Dummy key so pipeline instantiation doesn't fail
          ANTHROPIC_API_KEY: test-key-ci
          # Disable auth so test client doesn't need to pass API key
          API_KEY: ""
          JSON_LOGS: "false"
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check agentic_rag/ --select E,F,W --ignore E501,W291,W293

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agentic-rag:${{ github.sha }} .

      - name: Smoke test container starts
        run: |
          docker run -d --name smoke \
            -e ANTHROPIC_API_KEY=test-key \
            -e API_KEY="" \
            -p 8001:8000 \
            agentic-rag:${{ github.sha }} || true
          sleep 5
          docker logs smoke
