# Cloud Build pipeline — runs on every push to main.
# Triggered automatically by deploy.sh or manually via:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_CHROMA_HOST=10.x.x.x
#
# Required substitutions (set in the Cloud Build trigger):
#   _CHROMA_HOST  — internal IP of the ChromaDB VM
#
# Optional overrides:
#   _REGION, _REPO, _SERVICE

substitutions:
  _REGION:       us-central1
  _REPO:         rag-api
  _SERVICE:      rag-api
  _CHROMA_HOST:  ""       # set in trigger; empty = embedded mode (tests only)
  _CHROMA_PORT:  "8001"

options:
  logging:     CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Run tests (no API key required — all mocked) ──────────────────────────
  - name: python:3.11-slim
    id:   test
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt -q
        python -m pytest tests/ -q --tb=short
    env:
      - ANTHROPIC_API_KEY=test-key-ci
      - API_KEY=
      - JSON_LOGS=false

  # ── 2. Build Docker image ────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id:   build
    waitFor: [test]
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agentic-rag:latest
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agentic-rag:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agentic-rag:latest
      - .

  # ── 3. Push to Artifact Registry ─────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id:   push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agentic-rag

  # ── 4. Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id:   deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agentic-rag:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --execution-environment=gen2
      - --memory=2Gi
      - --cpu=2
      - --min-instances=1
      - --max-instances=10
      - --concurrency=80
      - --timeout=600
      - --no-allow-unauthenticated
      - --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,API_KEY=rag-api-key:latest
      - --set-env-vars=CHROMA_HOST=${_CHROMA_HOST},CHROMA_PORT=${_CHROMA_PORT},JSON_LOGS=true,LOG_LEVEL=INFO,WORKERS=1
      - --quiet

  # ── 5. Smoke test ────────────────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id:   smoke-test
    waitFor: [deploy]
    entrypoint: bash
    args:
      - -c
      - |
        URL=$(gcloud run services describe ${_SERVICE} \
          --region=${_REGION} --format='value(status.url)')
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
        echo "Health check → HTTP $STATUS  ($URL/health)"
        [ "$STATUS" = "200" ] || exit 1

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agentic-rag:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/agentic-rag:latest
