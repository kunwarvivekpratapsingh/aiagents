version: "3.9"

# Production docker-compose for GCP Compute Engine.
# ChromaDB runs as a separate HTTP server — the API container is stateless.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gcp.yml up -d

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: rag_chromadb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"   # bind to localhost only — not exposed publicly
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      # Clear embedded path so HTTP mode is used
      - CHROMA_DIR=

volumes:
  chroma_data:
    driver: local
